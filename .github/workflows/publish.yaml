name: Publish Extension

on:
  # release:
  #   types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.1.0)'
        required: true
        default: 'v1.1.0'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Download VSIX from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release download "$RELEASE_TAG" --repo ${{ github.repository }} --pattern "*.vsix"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: ovsx publish *.vsix --pat ${{ secrets.OVSX_PAT }}
